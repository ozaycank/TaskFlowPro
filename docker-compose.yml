version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: velyo_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velyo_db
    ports:
      - "5433:5432" # DÄ±ÅŸ portu 5433 yaptÄ±k
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    container_name: velyo_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Placeholder for backend/frontend containers (to be added when writing Dockerfiles)
  # api:
  # web:

volumes:
  postgres_data: